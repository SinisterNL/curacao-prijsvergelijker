name: Scrape & Update Prices

on:
  schedule:
    - cron: '0 6 */3 * *'   # Every 72 hours at 06:00 UTC
  workflow_dispatch:          # Manual trigger from GitHub

permissions:
  contents: write
  issues: write               # Needed to create issue when Centrum comes online

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Scrape Goisco
        run: python goisco_scraper.py

      - name: Scrape Mangusa
        run: python mangusa_scraper.py

      - name: Run product matcher
        run: python matcher.py

      - name: Process and merge data
        run: python prepare_data.py

      - name: Check Centrum status
        id: centrum
        run: |
          python centrum_monitor.py
          echo "centrum_online=$?" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Create issue if Centrum is back online
        if: steps.centrum.outputs.centrum_online == '1'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🛒 Centrum Supermarket is back online!',
              body: 'The Centrum Supermarket Shopify store responded successfully. Time to build the Centrum scraper!\n\nRun `centrum_scraper.py` to get started.',
              labels: ['enhancement']
            })

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.js goisco_products.json mangusa_products.json matches.json centrum_status.json
          git diff --staged --quiet || git commit -m "Auto-update: prices scraped $(date +'%Y-%m-%d %H:%M UTC')"
          git push --force-with-lease origin master
